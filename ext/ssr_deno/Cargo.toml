[package]
name = "ssr_deno"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
magnus = { version = "0.8", features = ["embed"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
deno_runtime = "0.254.0"

[profile.release]
lto = true
codegen-units = 1
strip = true

[patch.crates-io]
v8 = { path = "/home/maurizio/Sviluppo/rusty_v8" }
