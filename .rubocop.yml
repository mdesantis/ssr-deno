plugins:
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rake
  - rubocop-thread_safety

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  Exclude:
    - 'ext/ssr_deno/target/**/*'
    - 'plans/**/*'
    - 'samples/**/*'
    - 'scripts/**/*'
    - 'tmp/**/*'
    - 'test/dummy/**/*'
    - 'test/internal/**/*'
    - 'vendor/**/*'

Layout/HeredocIndentation:
  Enabled: false

Layout/LineLength:
  Max: 120

Metrics/AbcSize:
  Exclude:
    - 'test/**/*'
    - 'rakelib/**/*'

Metrics/BlockLength:
  Exclude:
    - 'Rakefile'
    - 'rakelib/**/*'
    - 'ssr-deno.gemspec'

Metrics/ClassLength:
  Exclude:
    - 'test/**/*'

Metrics/CyclomaticComplexity:
  Exclude:
    - 'test/**/*'
    - 'rakelib/**/*'

Metrics/MethodLength:
  Max: 15
  CountAsOne:
    - array
    - hash
    - heredoc
  Exclude:
    - 'test/**/*'
    - 'rakelib/**/*'

Metrics/PerceivedComplexity:
  Exclude:
    - 'test/**/*'
    - 'rakelib/**/*'

Naming/RescuedExceptionsVariableName:
  PreferredName: error

ThreadSafety/NewThread:
  Exclude:
    - 'test/**/*'
Naming/VariableNumber:
  EnforcedStyle: snake_case

Style/ClassAndModuleChildren:
  EnforcedStyle: nested
Style/Documentation:
  Enabled: false
Style/EmptyMethod:
  Enabled: false
Style/StringLiterals:
  EnforcedStyle: single_quotes
