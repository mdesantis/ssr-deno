name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  V8_FROM_SOURCE: 'true'
  GN_ARGS: 'v8_monolithic=true v8_monolithic_for_shared_library=true'
  RB_SYS_CARGO_PROFILE: 'release'
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: 'sccache'
  RUSTFLAGS: '-C link-arg=-fuse-ld=mold'
  CARGO_TARGET_DIR: tmp/cargo-target
  RB_SYS_CARGO_TARGET_DIR: ${{ github.workspace }}/tmp/cargo-target

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: CI - ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install V8 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq --no-install-suggests --no-install-recommends \
            ninja-build \
            python3 \
            libglib2.0-dev \
            mold \
            pkg-config
      - name: Install Clang 19 (required by V8)
        run: |
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | \
            sudo dd of=/etc/apt/sources.list.d/llvm-toolchain-noble-19.list
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/llvm-snapshot.gpg
          sudo apt-get update
          sudo apt-get -qq remove 'clang-*' 2>/dev/null || true
          sudo apt-get install -yq --no-install-suggests --no-install-recommends \
            lld-19 clang-19 libclang-19-dev
          echo "LIBCLANG_PATH=/usr/lib/llvm-19/lib" >> $GITHUB_ENV
      - name: Install Rust coverage tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov
      - name: Cache Cargo registry + git deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deps-${{ hashFiles('ext/ssr_deno/Cargo.lock') }}
          restore-keys: |
            cargo-deps-
      - name: Cache Cargo build artifacts (target dir)
        uses: actions/cache@v5
        with:
          path: tmp/cargo-target
          key: cargo-target-${{ runner.os }}-${{ matrix.ruby }}-${{ hashFiles('ext/ssr_deno/Cargo.lock') }}-${{ hashFiles('ext/ssr_deno/src/**/*.rs', 'ext/ssr_deno/crates/**/*.rs') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ matrix.ruby }}-${{ hashFiles('ext/ssr_deno/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ matrix.ruby }}-
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Apply rusty_v8 patch
        run: git -C vendor/rusty_v8/build apply ../../../vendor/rusty_v8.diff
      - name: Compile native extension
        run: bundle exec rake compile
      - name: Run Rust coverage (cargo-llvm-cov)
        run: bundle exec rake cargo:coverage
      - name: Run Clippy
        run: bundle exec rake cargo:clippy
      - name: Build SSR sample bundles
        run: bundle exec rake samples:build
      - name: Run tests
        run: bundle exec rake test
      - name: Check coverage
        if: matrix.ruby == '4.0'
        run: bundle exec rake coverage:check
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.ruby }}
          path: coverage/
          include-hidden-files: true
          retention-days: 7
      - name: Check Rust formatting
        run: bundle exec rake cargo:fmt
      - name: Run RuboCop
        run: bundle exec rake rubocop
      - name: Run RuboCop (Rails)
        run: bundle exec rake rubocop:rails
      - name: Validate RBS signatures
        run: bundle exec rake rbs
