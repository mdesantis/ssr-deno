name: CI

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

env:
  V8_FROM_SOURCE: 'true'
  GN_ARGS: 'v8_monolithic=true v8_monolithic_for_shared_library=true'
  RB_SYS_CARGO_PROFILE: 'release'
  SCCACHE: /home/runner/.cargo/bin/sccache
  RUSTFLAGS: '-C link-arg=-fuse-ld=mold'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: CI - ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install V8 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq --no-install-suggests --no-install-recommends \
            ninja-build \
            python3 \
            libglib2.0-dev \
            mold \
            pkg-config
      - name: Install Clang 19 (required by V8)
        run: |
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | \
            sudo dd of=/etc/apt/sources.list.d/llvm-toolchain-noble-19.list
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/llvm-snapshot.gpg
          sudo apt-get update
          sudo apt-get -qq remove 'clang-*' 2>/dev/null || true
          sudo apt-get install -yq --no-install-suggests --no-install-recommends \
            lld-19 clang-19 libclang-19-dev
          echo "LIBCLANG_PATH=/usr/lib/llvm-19/lib" >> $GITHUB_ENV
      - name: Install sccache (V8 C++ compilation cache)
        run: cargo install sccache --locked
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Compile native extension
        run: bundle exec rake compile
      - name: Build Vite SSR sample bundle
        run: bundle exec rake samples:build
      - name: Run tests
        run: bundle exec rake test
      - name: Run RuboCop
        run: bundle exec rubocop
      - name: Validate RBS signatures
        run: bundle exec rake rbs
