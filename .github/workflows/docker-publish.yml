name: Docker Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - { version: '4.0.5', tag: '4.0' }
          - { version: '3.4.9', tag: '3.4' }
          - { version: '3.3.11', tag: '3.3' }
        platform:
          - { name: amd64, runner: ubuntu-latest    }
          - { name: arm64, runner: ubuntu-26.04-arm }
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.platform.name }}
          build-args: |
            RUBY_VERSION=${{ matrix.ruby.version }}
          target: base
          cache-from: type=gha,scope=${{ matrix.platform.name }}-ruby${{ matrix.ruby.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform.name }}-ruby${{ matrix.ruby.tag }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-ruby${{ matrix.ruby.tag }}-${{ matrix.platform.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - { version: '4.0.5', tag: '4.0' }
          - { version: '3.4.9', tag: '3.4' }
          - { version: '3.3.11', tag: '3.3' }
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-ruby${{ matrix.ruby.tag }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}-ruby${{ matrix.ruby.tag }}
            type=semver,pattern={{major}}.{{minor}}-ruby${{ matrix.ruby.tag }}
            type=raw,value=latest-ruby${{ matrix.ruby.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
